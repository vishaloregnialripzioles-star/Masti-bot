services:
  - type: web
    name: masti-bot
    env: node
    region: oregon
    plan: free
    rootDir: bot
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: masti-bot-db
          property: connectionString
      - key: NODE_ENV
        value: production

databases:
  - name: masti-bot-db
    databaseName: mastibot
    user: mastibot
    region: oregon
    plan: free
